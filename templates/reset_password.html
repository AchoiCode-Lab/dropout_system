<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - EduPredict</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#050811;--sf:#111631;--bd:rgba(255,255,255,.08);--bds:rgba(255,255,255,.14);--tx:#eef0f8;--tx2:#b0b8d0;--txm:#6a7294;--pr:#7c3aed;--prh:#a78bfa;--prg:rgba(124,58,237,.2);--ibg:#0c1028;--red:#f43f5e;--grn:#34d399}
[data-theme="light"]{--bg:#f4f5f9;--sf:#ffffff;--bd:rgba(0,0,0,.06);--bds:rgba(0,0,0,.12);--tx:#111827;--tx2:#374151;--txm:#6b7280;--pr:#6d28d9;--prh:#7c3aed;--prg:rgba(109,40,217,.12);--ibg:#fff;--red:#e11d48;--grn:#059669}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;transition:background .4s;padding:24px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:24px;padding:48px 44px;max-width:440px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.2)}
[data-theme="light"] .card{box-shadow:0 24px 64px rgba(15,23,42,.06)}
.card h2{font-family:'Fraunces',Georgia,serif;font-size:28px;font-weight:600;margin-bottom:6px;letter-spacing:-.03em}
.card .sub{color:var(--tx2);margin-bottom:28px;font-size:15px}
.logo{font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:600;color:var(--pr);letter-spacing:-.03em;margin-bottom:32px;display:block}.logo span{color:var(--red)}
.fg{margin-bottom:20px}
.fg label{display:block;font-weight:600;font-size:13px;margin-bottom:8px;color:var(--tx2)}
.fg input{width:100%;padding:13px 16px;border:1.5px solid var(--bds);border-radius:14px;font-family:inherit;font-size:15px;background:var(--ibg);color:var(--tx);transition:all .15s;outline:none}
.fg input::placeholder{color:var(--txm)}
.fg input:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--prg)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 20px;border-radius:14px;font-family:inherit;font-weight:600;font-size:15px;border:none;cursor:pointer;transition:all .18s;background:var(--pr);color:#fff}
.btn:hover{background:var(--prh);transform:translateY(-1px);box-shadow:0 8px 24px var(--prg)}
.alert{padding:12px 16px;border-radius:12px;margin-bottom:20px;font-size:14px;border-left:3px solid}
.alert-danger{background:rgba(244,63,94,.08);color:var(--red);border-color:var(--red)}
.alert-success{background:rgba(52,211,153,.08);color:var(--grn);border-color:var(--grn)}
</style>
</head>
<body>
<div class="card">
    <div class="logo">Edu<span>.</span>Predict</div>
    <h2>Reset password</h2>
    <p class="sub">Enter your new password below.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}{% endif %}{% endwith %}
    <form method="POST">
        <div class="fg">
            <label>New Password</label>
            <input type="password" name="password" placeholder="Min 6 characters" required autofocus>
        </div>
        <div class="fg">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" placeholder="Re-enter new password" required>
        </div>
        <button type="submit" class="btn"><i class="fas fa-lock"></i> Reset Password</button>
    </form>
</div>
<script>var sv=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',sv);</script>
</body>
</html>
