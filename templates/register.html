<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - EduPredict</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#050811;--sf:#111631;--bd:rgba(255,255,255,.08);--bds:rgba(255,255,255,.14);--tx:#eef0f8;--tx2:#b0b8d0;--txm:#6a7294;--pr:#7c3aed;--prh:#a78bfa;--prg:rgba(124,58,237,.2);--ibg:#0c1028;--red:#f43f5e;--grn:#34d399}
[data-theme="light"]{--bg:#f4f5f9;--sf:#ffffff;--bd:rgba(0,0,0,.06);--bds:rgba(0,0,0,.12);--tx:#111827;--tx2:#374151;--txm:#6b7280;--pr:#6d28d9;--prh:#7c3aed;--prg:rgba(109,40,217,.12);--ibg:#fff;--red:#e11d48;--grn:#059669}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s;padding:24px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:24px;padding:44px;max-width:540px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.2)}
[data-theme="light"] .card{box-shadow:0 24px 64px rgba(15,23,42,.06)}
h2{font-family:'Fraunces',Georgia,serif;font-size:28px;font-weight:600;margin-bottom:6px;letter-spacing:-.03em}
.sub{color:var(--tx2);margin-bottom:28px;font-size:15px}
.logo{font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:600;color:var(--pr);letter-spacing:-.03em;margin-bottom:28px;display:block}.logo span{color:var(--red)}
.fg{margin-bottom:18px}
.fg label{display:block;font-weight:600;font-size:13px;margin-bottom:8px;color:var(--tx2)}
.fg input,.fg select{width:100%;padding:13px 16px;border:1.5px solid var(--bds);border-radius:14px;font-family:inherit;font-size:15px;background:var(--ibg);color:var(--tx);transition:all .15s;outline:none;-webkit-appearance:none}
.fg input::placeholder{color:var(--txm)}
.fg input:focus,.fg select:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--prg)}
.fg select option{background:var(--sf);color:var(--tx)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:48px}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txm);cursor:pointer;font-size:16px;padding:4px;transition:color .15s}
.pw-eye:hover{color:var(--pr)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 20px;border-radius:14px;font-family:inherit;font-weight:600;font-size:15px;border:none;cursor:pointer;transition:all .18s;background:var(--pr);color:#fff;margin-top:8px}
.btn:hover{background:var(--prh);transform:translateY(-1px);box-shadow:0 8px 24px var(--prg)}
.alert{padding:12px 16px;border-radius:12px;margin-bottom:20px;font-size:14px;border-left:3px solid}
.alert-danger{background:rgba(244,63,94,.08);color:var(--red);border-color:var(--red)}
.alert-success{background:rgba(52,211,153,.08);color:var(--grn);border-color:var(--grn)}
.links{text-align:center;margin-top:24px;font-size:14px;color:var(--txm)}.links a{color:var(--pr);font-weight:600;text-decoration:none}
.th-pill{position:fixed;top:20px;right:20px;display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;background:var(--sf);border:1px solid var(--bd);color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;box-shadow:0 4px 12px rgba(0,0,0,.1)}.th-pill:hover{border-color:var(--pr);color:var(--pr)}
.back{position:fixed;top:20px;left:20px;color:var(--tx2);font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;transition:color .15s;text-decoration:none}.back:hover{color:var(--tx)}
@media(max-width:500px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<a href="{{ url_for('index') }}" class="back"><i class="fas fa-arrow-left"></i> Back</a>
<button class="th-pill" onclick="toggleTheme()"><i id="thIcon" class="fas fa-moon"></i><span id="thTxt">Dark</span></button>
<div class="card">
    <div class="logo">Edu<span>.</span>Predict</div>
    <h2>Create account</h2>
    <p class="sub">Register to access the prediction system.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}{% endif %}{% endwith %}
    <form method="POST">
        <div class="fg">
            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="e.g. Madam Nor Fadilah" required>
        </div>
        <div class="fg">
            <label>Email</label>
            <input type="email" name="email" placeholder="youremail@example.com" required>
        </div>
        <div class="row2">
            <div class="fg">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose username" required>
            </div>
            <div class="fg">
                <label>Role</label>
                <select name="role">
                    <option value="teacher">Teacher</option>
                    <option value="counselor">Counselor</option>
                </select>
            </div>
        </div>
        <div class="row2">
            <div class="fg">
                <label>Password</label>
                <div class="pw-wrap">
                    <input type="password" name="password" id="pw1" placeholder="Min 6 characters" required>
                    <button type="button" class="pw-eye" onclick="togglePw('pw1',this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="fg">
                <label>Confirm Password</label>
                <div class="pw-wrap">
                    <input type="password" name="confirm_password" id="pw2" placeholder="Re-enter password" required>
                    <button type="button" class="pw-eye" onclick="togglePw('pw2',this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
        </div>
        <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Create Account</button>
    </form>
    <p class="links">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
<script>
function toggleTheme(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('theme',n);u(n)}
function u(t){var i=document.getElementById('thIcon'),s=document.getElementById('thTxt');if(i)i.className=t==='dark'?'fas fa-moon':'fas fa-sun';if(s)s.textContent=t==='dark'?'Dark':'Light'}
function togglePw(id,btn){var inp=document.getElementById(id);var ico=btn.querySelector('i');if(inp.type==='password'){inp.type='text';ico.className='fas fa-eye-slash'}else{inp.type='password';ico.className='fas fa-eye'}}
var sv=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',sv);u(sv);
</script>
</body>
</html>
